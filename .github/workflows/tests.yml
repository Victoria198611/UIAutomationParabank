name: Run UIAutomationParabank Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Run tests
        run: mvn clean test || true

      - name: Fix Allure results path
        run: |
          echo "🔧 Fixing Allure results path..."
          mkdir -p target/allure-results
          if [ -d "target/target/allure-results" ]; then
            mv target/target/allure-results/* target/allure-results/ || true
            rm -rf target/target || true
          fi
          echo "📁 Allure results directory content:"
          ls -R target/allure-results || true

      - name: Create environment.properties
        run: |
          echo "Browser=Chrome" > target/allure-results/environment.properties
          echo "OS=Ubuntu" >> target/allure-results/environment.properties
          echo "Java=17" >> target/allure-results/environment.properties

      - name: Generate Allure Report
        run: |
          mvn allure:report || true
          echo "Listing generated Allure report files:"
          ls -R target/site/allure-maven-plugin || true


  report-build-status:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Report build status
        run: |
          echo "======================================"
          echo "Build completed successfully!"
          echo " Allure report generated."
          echo "Ready for deployment to GitHub Pages."
          echo "======================================"


  deploy:
    runs-on: ubuntu-latest
    needs: report-build-status
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Allure report exists
        run: |
          if [ ! -f "target/site/allure-maven-plugin/index.html" ]; then
            echo " Allure report not found. Deployment skipped."
            exit 1
          fi

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          keep_files: true
          commit_message: "Deploy Allure Report from GitHub Actions"