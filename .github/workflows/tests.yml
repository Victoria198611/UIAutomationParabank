name: Run UIAutomationParabank Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Run tests
        run: mvn clean test || true

      - name: Create environment.properties
        run: |
          mkdir -p target/allure-results
          echo "Browser=Chrome" > target/allure-results/environment.properties
          echo "OS=Ubuntu" >> target/allure-results/environment.properties
          echo "Java=17" >> target/allure-results/environment.properties

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Generate Allure Report
        run: |
          mvn allure:report || true
          echo "Listing generated Allure report files:"
          ls -R target/site/allure-maven-plugin || true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin

      - name: Publish Allure Report
        uses: simple-elf/allure-report-action@v1.6
        with:
          allure_results: target/allure-results
          allure_report: target/site/allure-maven-plugin
          gh_pages: gh-pages