name: UI Tests and Deploy Allure Report

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Run tests
        run: mvn clean test -Dmaven.test.failure.ignore=true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Fix Allure results path
        run: |
          echo " Fixing Allure results path..."
          mkdir -p target/allure-results
          if [ -d "target/target/allure-results" ]; then
            mv target/target/allure-results/* target/allure-results/ || true
            rm -rf target/target || true
          fi
          echo " Allure results directory content:"
          ls -R target/allure-results || true

      - name: Generate Allure Report
        run: |
          echo " Generating Allure report..."
          allure generate target/allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false